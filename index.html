<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#FFB300">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="פאזל מילים">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
  <title>בונה הפאזל של המשפט</title>
</head>
<body>

<!-- WELCOME -->
<div id="screen-welcome" class="screen">
  <div class="welcome-owl">🦉</div>
  <div class="welcome-title-box">
    <div class="welcome-title">בונה הפאזל<br>של המשפט</div>
  </div>
  <p class="welcome-subtitle">מצא את מילת הקישור הנכונה<br>וחבר את שני חלקי המשפט!</p>
  <div class="level-select">
    <button class="level-btn l1" data-level="1">
      <span>🌱 מתחיל</span>
      <span class="level-badge">כי / לכן / אבל</span>
    </button>
    <button class="level-btn l2" data-level="2">
      <span>⭐ מתקדם</span>
      <span class="level-badge">כאשר / למרות / כדי</span>
    </button>
    <button class="level-btn l3" data-level="3">
      <span>🏆 אלוף</span>
      <span class="level-badge">כל המילים</span>
    </button>
  </div>
</div>

<!-- GAME -->
<div id="screen-game" class="screen hidden">
  <div class="game-header">
    <div class="score-badge">⭐ <span id="score-display">0</span></div>
    <div class="header-title-box">
      <div class="header-title-main" id="stage-title">בונה הפאזל</div>
      <div class="header-title-sub" id="stage-num">שלב 1 מתוך 5</div>
    </div>
    <button class="btn-back" id="btn-back">◀</button>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-text" id="progress-text">1/5</div>
  </div>

  <div class="puzzle-area">
    <div class="puzzle-pieces">
      <div class="piece piece-right" id="part-b">החתול היה רעב מאוד</div>
      <div class="connector-slot" id="connector-slot">?</div>
      <div class="piece piece-left" id="part-a">הוא לא אכל כל היום</div>
    </div>
    <div class="owl-area">
      <div class="owl-figure" id="owl-figure">🦉</div>
      <div class="speech-bubble" id="speech-bubble">מצא את המילה שמחברת את הרעיונות!</div>
    </div>
  </div>

  <div class="options-area">
    <div class="options-label">בחר את מילת הקישור הנכונה</div>
    <div class="options-grid" id="options-grid"></div>
  </div>

  <div class="action-bar">
    <div class="btn-hint-wrap">
      <button class="btn-hint" id="btn-hint">💡</button>
      <span class="btn-hint-label">רמז</span>
    </div>
    <button class="btn-check" id="btn-check" disabled>בדיקה ✓</button>
  </div>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen hidden">
  <div class="result-owl">🦉</div>
  <h2 class="result-title" id="result-title">מעולה! 🎉</h2>
  <div class="result-score-display">
    <div class="result-score-label">הניקוד שלך</div>
    <div class="result-score-num" id="result-score-num">0</div>
    <div class="result-stars" id="result-stars">⭐⭐⭐</div>
  </div>
  <div class="result-stats">
    <div class="stat-card">
      <div class="stat-val" id="result-correct">0</div>
      <div class="stat-lbl">נכונות</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="result-total">0</div>
      <div class="stat-lbl">סה"כ</div>
    </div>
  </div>
  <div class="result-btns">
    <button class="btn-primary" id="btn-play-again">🔄 שחק שוב</button>
    <button class="btn-secondary" id="btn-change-level">🏠 בחר רמה</button>
  </div>
</div>

<canvas id="confetti-canvas"></canvas>

<!-- DEV CONSOLE -->
<div id="dev-console">
  <div id="dev-console-header">
    <span>🛠 DEV</span>
    <div style="display:flex;gap:8px">
      <button id="dev-clear">clear</button>
      <button id="dev-close">✕</button>
    </div>
  </div>
  <div id="dev-log"></div>
</div>

<script>
(function(){
  let n=0,t,open=false;
  document.addEventListener('touchstart',()=>{
    n++; clearTimeout(t);
    t=setTimeout(()=>n=0,600);
    if(n>=3){n=0;open=!open;document.getElementById('dev-console').classList.toggle('open',open);}
  },{passive:true});
  document.addEventListener('DOMContentLoaded',()=>{
    document.getElementById('dev-close').onclick=()=>{open=false;document.getElementById('dev-console').classList.remove('open');};
    document.getElementById('dev-clear').onclick=()=>{document.getElementById('dev-log').innerHTML='';};
  });
  function log(type,args){
    const el=document.createElement('div');
    el.className='dev-entry dev-'+type;
    const t=new Date().toLocaleTimeString('he-IL',{hour12:false});
    el.innerHTML=`<span class="dev-time">${t}</span> `+args.map(a=>typeof a==='object'?JSON.stringify(a):String(a)).join(' ');
    const l=document.getElementById('dev-log');
    if(l){l.appendChild(el);l.scrollTop=l.scrollHeight;}
  }
  const _l=console.log.bind(console),_w=console.warn.bind(console),_e=console.error.bind(console);
  console.log=(...a)=>{_l(...a);log('log',a);};
  console.warn=(...a)=>{_w(...a);log('warn',a);};
  console.error=(...a)=>{_e(...a);log('error',a);};
  window.addEventListener('error',e=>log('error',[`❌ ${e.message} @${e.filename?.split('/').pop()}:${e.lineno}`]));
  window.addEventListener('unhandledrejection',e=>log('error',[`❌ ${e.reason}`]));
  document.addEventListener('touchstart',e=>{
    if(e.target.matches('button,.level-btn,.option-btn'))log('event',[`👆 ${e.target.id||e.target.className}`]);
  },{passive:true});
  console.log('🛠 DevConsole ready');
})();
</script>
<script src="puzzles.js"></script>
<script src="app.js"></script>
</body>
</html>
